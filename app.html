<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facebook Reaction Select</title>

  <style>

    body{
      background:#f0f2f5;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .reaction-container{
      position:relative;
    }

    .main-button{
      padding:12px 30px;
      border:none;
      border-radius:30px;
      font-size:20px;
      cursor:pointer;
      background:white;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    .reactions{
      position:absolute;
      bottom:70px;
      left:50%;
      transform:translateX(-50%);
      background:white;
      padding:10px;
      border-radius:50px;
      display:flex;
      gap:10px;
      opacity:0;
      pointer-events:none;
      transition:0.3s;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    .reaction-container:hover .reactions{
      opacity:1;
      pointer-events:auto;
    }

    .reaction{
      font-size:35px;
      cursor:pointer;
      transition:0.2s;
    }

    .reaction:hover{
      transform:scale(1.3) translateY(-8px);
    }

    .active{
      transform:scale(1.3);
    }

  </style>
</head>

<body>

  <div class="reaction-container">

    <!-- Main Selected Button -->
    <button class="main-button" id="mainButton">
      👍 Like
    </button>

    <!-- Reactions -->
    <div class="reactions">

      <span class="reaction">👍</span>

      <span class="reaction">❤️</span>

      <span class="reaction">😮</span>

      <span class="reaction">😂</span>

      <span class="reaction">😢</span>

      <span class="reaction">😡</span>

    </div>

  </div>

  <script>

    const reactions = document.querySelectorAll(".reaction");
    const mainButton = document.getElementById("mainButton");

    reactions.forEach(reaction => {

      reaction.addEventListener("click", () => {

        // Remove old active
        reactions.forEach(r => r.classList.remove("active"));

        // Add active class
        reaction.classList.add("active");

        // Set selected reaction on button
        mainButton.innerHTML = reaction.innerHTML;

      });

    });

  </script>

</body>
</html>
